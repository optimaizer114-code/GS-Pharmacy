version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: pharmacy_db
    restart: always
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: StrongPass123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - pharmacy_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacy_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://pharmacy_user:StrongPass123!@db:5432/pharmacy_db
      SECRET_KEY: your-super-secret-key-change-in-production-min-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      ENVIRONMENT: production
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - pharmacy_net
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

networks:
  pharmacy_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: